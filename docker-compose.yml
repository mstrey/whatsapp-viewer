networks:
  frontend:
    name: frontend
    external: true
  backend:
    name: backend
    external: true

services:
  web:
    image: nginx:alpine
    ports:
      - "5200:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./chat_data:/var/www/html/chat_data
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1//login.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - frontend
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.services.${SERVICE}.loadbalancer.server.port=80"
      - "traefik.http.routers.${SERVICE}.rule=Host(`${SERVICE}.${DOMAIN}`)"
      - "traefik.http.routers.${SERVICE}.entrypoints=web"

  php:
    image: php:8.2-fpm-alpine
    env_file:
      - .env
    volumes:
      - ./src:/var/www/html
      - ./chat_data:/var/www/html/chat_data
      - ./tests:/var/www/tests
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep :9000 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
      